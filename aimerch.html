<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BLAIRE — Merch</title>
  <style>
    body {
      margin: 0;
      font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
      background: #050505;
      color: #aaa;
      letter-spacing: 1px;
    }

    /* Background video */
    .bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: -1;
      opacity: 0.5;
      filter: grayscale(100%) contrast(120%) brightness(60%);
    }

    /* Header */
    header {
      margin-top: 50px;
      height: 20vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    header h1 {
      font-size: 2.2rem;
      font-weight: 300;
      color: #888;
      letter-spacing: 2px;
      margin: 0;
    }

    /* Merch grid */
    .merch-section {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 60px;
      padding: 40px;
    }

    .item {
      text-align: center;
      width: 220px;
      background: black;
      border: 1px solid rgba(255, 255, 255, 0.4);
      padding: 20px; 
    }

    .item img {
      width: 100%;
      height: auto;
      transition: transform 0.3s ease, filter 0.3s ease;
    }

    .item:hover img {
      transform: scale(1.05);
      filter: brightness(1.2);
    }

    .item h2 {
      font-size: 0.9rem;
      color: #777;
      margin-top: 15px;
      letter-spacing: 2px;
    }

    .item p {
      font-size: 0.75rem;
      color: #555;
    }

    /* Buy button */
    .buy-btn {
      margin-top: 10px;
      display: inline-block;
      padding: 6px 14px;
      border: 1px solid #333;
      color: #777;
      text-decoration: none;
      font-size: 0.7rem;
      transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    }

    .buy-btn:hover {
      background: #111;
      color: #ccc;
      border-color: #555;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 60px 20px;
      font-size: 0.7rem;
      color: #686868;
    }
  </style>
</head>
<body>

  <video autoplay muted loop playsinline class="bg-video">
    <source src="WEBSITE VIDEO.mp4" type="video/mp4">
  </video>

  <header>
    <h1>MERCH</h1>
  </header>

  <section class="merch-section">

    <div class="item">
      <img src="hoodie.png" alt="Hoodie">
      <h2>VOID HOODIE</h2>
      <p>$30</p>
      <a href="#" class="buy-btn">VIEW</a>
    </div>

    <div class="item">
      <img src="hat.png" alt="Hat">
      <h2>STAR CAP</h2>
      <p>$15</p>
      <a href="#" class="buy-btn">VIEW</a>
    </div>

    <div class="item">
      <img src="hat.png" alt="Hat">
      <h2>STAR CAP</h2>
      <p>$15</p>
      <a href="#" class="buy-btn">VIEW</a>
    </div>
    
    <div class="item">
      <img src="hat.png" alt="Hat">
      <h2>STAR CAP</h2>
      <p>$15</p>
      <a href="#" class="buy-btn">VIEW</a>
    </div>

  </section>

  <footer>
    <p>© BLAIRE</p>
  </footer>

  <script>
  function typeWriter(element, text, speed = 180) {
    element.textContent = '|';
    let i = 0;
    const timer = setInterval(() => {
      element.textContent = text.slice(0, i + 1) + '|';
      i++;
      if (i >= text.length) {
        // blink the cursor after typing is done
        let visible = true;
        setInterval(() => {
          element.textContent = visible ? text + '|' : text;
          visible = !visible;
        }, 700);
        clearInterval(timer);
      }
    }, speed);
  }

  window.onload = () => {
    const heading = document.querySelector('header h1');
    if (heading) {
      const text = heading.textContent.trim();
      typeWriter(heading, text);
    }
  };
</script>

</body>
</html>
